services:
  nas-speed-monitor:
    build: .
    container_name: nas-speed-monitor
    restart: always
    ports:
      - "18080:8080"
    environment:
      TZ_OFFSET_HOURS: 8
      SCHEDULE_MINUTES: 120
      SCHEDULE_CLOCK_TIMES: "07:30,13:30,19:30,01:30"
      RUN_ON_START: "true"
      ENABLE_INTERNET_TEST: "true"
      ENABLE_LAN_TEST: "false"
      ENABLE_HEARTBEAT_TEST: "true"
      HEARTBEAT_INTERVAL_SECONDS: 60
      HEARTBEAT_TARGET: "223.5.5.5"
      HEARTBEAT_TARGETS: "223.5.5.5,119.29.29.29,180.76.76.76,1.1.1.1,8.8.8.8"
      HEARTBEAT_TIMEOUT_SECONDS: 2
      INTERNET_SPEEDTEST_SERVER_ID: ""
      INTERNET_SERVER_POOL: "3633,5396,30852,59386"
      INTERNET_RETRIES: 2
      INTERNET_RETRY_DELAY_SECONDS: 5
      DOWNLOAD_ALERT_MBPS: 5
      UPLOAD_ALERT_MBPS: 1
      LATENCY_ALERT_MS: 100
      TEST_DURATION_ALERT_SECONDS: 60
      LAN_IPERF_HOST: "192.168.1.2"
      LAN_IPERF_PORT: 5201
      LAN_IPERF_DURATION_SECONDS: 10
      RETENTION_DAYS: 30
      DATA_DIR: /data
      ENABLE_BARK_NOTIFICATIONS: "true"
      BARK_WEBHOOK_URL: "https://bark.wmgylc.top:10000"
      BARK_WEBHOOK_TOKEN: "CzS6dEcWSikbSJomnfYgZT"
      BARK_SOURCE_NAME: "NAS 外网监测"
      BARK_PUSH_TIMEOUT_SECONDS: 8
      BARK_DEDUP_MINUTES: 30
      BARK_DAILY_REPORT_HOUR: 8
      BARK_DAILY_REPORT_MINUTE: 30
      NOTIFY_DOMESTIC_FAILURE_STREAK: 2
      NOTIFY_DOMESTIC_LOOKBACK_MINUTES: 15
      NOTIFY_INTERNATIONAL_TARGETS: "8.8.8.8"
      NOTIFY_INTERNATIONAL_LOOKBACK_MINUTES: 30
      NOTIFY_INTERNATIONAL_SUCCESS_RATE: 98
      NOTIFY_INTERNATIONAL_LATENCY_MS: 190
      NOTIFY_INTERNATIONAL_ANOMALY_SUCCESS_RATE: 80
      NOTIFY_INTERNATIONAL_ANOMALY_LATENCY_MS: 220
      NOTIFY_INTERNATIONAL_FAILURE_STREAK: 3
      NOTIFY_INTERNATIONAL_BAD_TARGETS: 2
      NOTIFY_INTERNATIONAL_RECOVERY_MINUTES: 15
      NOTIFY_SPEEDTEST_DOWNLOAD_MBPS: 300
      NOTIFY_SPEEDTEST_UPLOAD_MBPS: 20
      NOTIFY_SPEEDTEST_LATENCY_MS: 80
      NOTIFY_SPEEDTEST_DURATION_SECONDS: 120
      NOTIFY_SPEEDTEST_STREAK: 2
    volumes:
      - ./data:/data
